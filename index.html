<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleiverRuiz-LU GitHub</title>
    <!-- Font Awesome for Icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }
        header, footer {
            background-color: #000000;
            color: white;
            padding: 20px 0;
            text-align: left;
            padding-left: 20px;
        }
        .hero {
            background: url('Background_Image.png') no-repeat center center;
            background-size: cover;
            color: white;
            padding: 100px 20px;
            text-align: center;
        }
        .hero h1 {
            font-size: 48px;
            margin: 0;
        }
        .hero p {
            font-size: 20px;
        }
        .hero a {
            color: white;
            background-color: darkorange;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        .repositories, .contacts {
            padding: 50px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .repositories h2, .contacts h2 {
            color: #ff9800;
            font-size: 30px;
        }
        .repository {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .repository h3 {
            margin: 0;
        }
        .repository a {
            color: #ff9800;
            text-decoration: none;
        }
        .repository p {
            font-size: 16px;
            color: #dddddd;
        }
        .image-container {
            text-align: center;
        }
        .image-container img {
            width: 500px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .contacts ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: space-around;
            max-width: 400px;
            margin: 0 auto;
        }
        .contacts li {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        .contacts li a {
            text-decoration: none;
            color: #ff9800;
            font-size: 18px;
            margin-left: 10px;
        }
        .contacts li i {
            font-size: 24px;
            color: #ff9800;
        }
        footer p {
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>CleiverRuiz-LU GitHub</h1>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>CleiverRuiz-LU GitHub</h1>
        <p>Explore my GitHub repositories and organizations.</p>
        <a href="#repositories">Explore Repos</a>
    </section>

    <!-- Repositories Section -->
    <section id="repositories" class="repositories">
        <h2>My GitHub Repositories</h2>
        <div id="repo-list">
            <!-- Repositories will be loaded here by JavaScript -->
        </div>
        <div class="image-container">
            <img src="Github_image.png" alt="Example Image">
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contacts">
        <h2>Contacts</h2>
        <ul>
            <li>
                <i class="fab fa-instagram"></i>
                <a href="https://www.instagram.com/_cleiverr/" target="_blank">Instagram</a>
            </li>
            <li>
                <i class="fab fa-facebook"></i>
                <a href="https://www.facebook.com/cleiver.ruiz.33/" target="_blank">Facebook</a>
            </li>
            <li>
                <i class="fab fa-linkedin"></i>
                <a href="https://www.linkedin.com/feed/?trk=guest_homepage-basic_nav-header-signin" target="_blank">LinkedIn</a>
            </li>
        </ul>
    </section>

    <!-- Footer -->
    <footer>
        <p>All repositories and organizations associated with CleiverRuiz-LU GitHub</p>
    </footer>

    <!-- GitHub Repositories JavaScript -->
    <script>
        const username = 'CleiverRuiz-LU'; // Your GitHub username
        const repoList = document.getElementById('repo-list');

        // Fetch GitHub repositories
        fetch(`https://api.github.com/users/${username}/repos`)
            .then(response => response.json())
            .then(data => {
                data.forEach(repo => {
                    const repoDiv = document.createElement('div');
                    repoDiv.classList.add('repository');

                    const repoName = document.createElement('h3');
                    const repoLink = document.createElement('a');
                    repoLink.href = repo.html_url;
                    repoLink.target = '_blank';
                    repoLink.textContent = repo.name;
                    repoName.appendChild(repoLink);

                    const repoDescription = document.createElement('p');
                    repoDescription.textContent = repo.description || 'No description provided.';

                    repoDiv.appendChild(repoName);
                    repoDiv.appendChild(repoDescription);

                    repoList.appendChild(repoDiv);
                });
            })
            .catch(error => {
                console.error('Error fetching repositories:', error);
                const errorMessage = document.createElement('p');
                errorMessage.textContent = 'Failed to load repositories.';
                repoList.appendChild(errorMessage);
            });
    </script>
</body>
</html>
