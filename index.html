<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleiverRuiz-LU GitHub</title>
    <!-- Font Awesome for Icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
        }
        header, footer {
            background-color: #000000;
            color: white;
            padding: 20px 0;
            text-align: left;
            padding-left: 20px;
        }
        .hero {
            background: url('Background_Image.png') no-repeat center center;
            background-size: cover;
            color: #000000; /* Black text for contrast on white background */
            padding: 100px 20px;
            text-align: center;
        }
        .hero h1 {
            font-size: 48px;
            margin: 0;
        }
        .hero p {
            font-size: 20px;
        }
        .hero a {
            color: white;
            background-color: black;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        .repositories, .contacts, .organizations {
            padding: 50px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        h2 {
            color: #000000; /* Black headers */
            font-size: 30px;
        }
        .repository, .organization {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .repository h3, .organization h3 {
            margin: 0;
        }
        .repository a, .organization a {
            color: #000000; /* Black links */
            text-decoration: none;
        }
        .repository p, .organization p {
            font-size: 16px;
            color: #555555;
        }
        .contacts ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: space-around;
            max-width: 400px;
            margin: 0 auto;
        }
        .contacts li {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        .contacts li a {
            text-decoration: none;
            color: #000000;
            font-size: 18px;
            margin-left: 10px;
        }
        .contacts li i {
            font-size: 24px;
            color: #000000;
        }
        footer p {
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>CleiverRuiz-LU GitHub</h1>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>CleiverRuiz-LU GitHub</h1>
        <p>Explore my GitHub repositories and organizations.</p>
        <a href="#repositories">Explore Repos</a>
    </section>

    <!-- Repositories Section -->
    <section id="repositories" class="repositories">
        <h2>My GitHub Repositories</h2>
        <div id="repo-list">
            <!-- Repositories will be loaded here by JavaScript -->
        </div>
    </section>

    <!-- Organizations Section -->
    <section id="organizations" class="organizations">
        <h2>Organizations</h2>
        <div id="org-list">
            <!-- Organizations will be loaded here by JavaScript -->
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contacts">
        <h2>Contacts</h2>
        <ul>
            <li>
                <i class="fab fa-instagram"></i>
                <a href="https://www.instagram.com/_cleiverr/" target="_blank">Instagram</a>
            </li>
            <li>
                <i class="far fa-envelope"></i>
                <a href="mailto:CIRuizMartinez@mail.lipscomb.edu">CIRuizMartinez@mail.lipscomb.edu</a>
            </li>
            <li>
                <i class="fab fa-linkedin"></i>
                <a href="https://www.linkedin.com/in/cleiver-ruiz-martinez/" target="_blank">LinkedIn</a>
            </li>
        </ul>
    </section>

    <!-- Footer -->
    <footer>
        <p>All repositories and organizations associated with CleiverRuiz-LU GitHub</p>
    </footer>

    <!-- GitHub Repositories and Organizations JavaScript -->
    <script>
        const username = 'CleiverRuiz-LU'; // Your GitHub username
        const repoList = document.getElementById('repo-list');
        const orgList = document.getElementById('org-list');

        // Fetch GitHub repositories
        fetch(`https://api.github.com/users/${username}/repos`)
            .then(response => response.json())
            .then(data => {
                data.forEach(repo => {
                    const repoDiv = document.createElement('div');
                    repoDiv.classList.add('repository');

                    const repoName = document.createElement('h3');
                    const repoLink = document.createElement('a');
                    repoLink.href = repo.html_url;
                    repoLink.target = '_blank';
                    repoLink.textContent = repo.name;
                    repoName.appendChild(repoLink);

                    const repoDescription = document.createElement('p');
                    repoDescription.textContent = repo.description || 'No description provided.';

                    repoDiv.appendChild(repoName);
                    repoDiv.appendChild(repoDescription);

                    repoList.appendChild(repoDiv);
                });
            })
            .catch(error => {
                console.error('Error fetching repositories:', error);
                const errorMessage = document.createElement('p');
                errorMessage.textContent = 'Failed to load repositories.';
                repoList.appendChild(errorMessage);
            });

        // Fetch GitHub organization
        const orgName = 'learningLogisticsLab';
        fetch(`https://api.github.com/orgs/${orgName}`)
            .then(response => response.json())
            .then(data => {
                const orgDiv = document.createElement('div');
                orgDiv.classList.add('organization');

                const orgName = document.createElement('h3');
                const orgLink = document.createElement('a');
                orgLink.href = data.html_url;
                orgLink.target = '_blank';
                orgLink.textContent = data.login;
                orgName.appendChild(orgLink);

                const orgDescription = document.createElement('p');
                orgDescription.textContent = data.description || 'No description provided.';

                orgDiv.appendChild(orgName);
                orgDiv.appendChild(orgDescription);

                orgList.appendChild(orgDiv);
            })
            .catch(error => {
                console.error('Error fetching organization:', error);
                const errorMessage = document.createElement('p');
                errorMessage.textContent = 'Failed to load organization.';
                orgList.appendChild(errorMessage);
            });
    </script>
</body>
</html>
